<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
      initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#fcd535">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Admin Panel">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Master Key Gen · Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont,
                "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        input {
            text-transform: uppercase;
        }

        input[type=password] {
            text-transform: none;
        }

        input::placeholder {
            text-transform: none;
            color: #475569;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.25s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Confirm Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            border: 1px solid rgba(248, 113, 113, 0.15);
            border-radius: 1rem;
            padding: 1.75rem;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 25px 60px -12px rgba(239, 68, 68, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.03);
            transform: scale(0.92) translateY(10px);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .modal-icon i {
            font-size: 1.25rem;
            color: #f87171;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <!-- ════════════════════════════
     PANTALLA 2 — NAVEGADOR
════════════════════════════ -->
    <div id="mainScreen" class="w-full max-w-sm space-y-4 fade-in">

        <!-- Tabs -->
        <div class="glass flex rounded-xl p-1 relative z-10">
            <button onclick="switchTab('gen')" id="tab_gen"
                class="flex-1 py-2 text-xs font-black uppercase text-slate-900 bg-yellow-400 rounded-lg transition-all active:scale-95">
                <i class="fa-solid fa-key mr-1"></i> Generar
            </button>
            <button onclick="switchTab('dash')" id="tab_dash"
                class="flex-1 py-2 text-xs font-black uppercase text-slate-400 hover:text-white transition-all active:scale-95">
                <i class="fa-solid fa-users mr-1"></i> Dashboard
            </button>
        </div>

        <!-- ════════════════════════════
             TAB: GENERADOR
        ════════════════════════════ -->
        <div id="view_gen" class="space-y-4">

            <!-- Selector de Producto -->
            <div class="glass rounded-2xl p-4">
                <p class="text-[10px] font-black text-slate-500 uppercase
              tracking-widest mb-3">
                    Seleccionar Producto
                </p>
                <div class="grid grid-cols-2 gap-2">
                    <!-- TasasAlDía -->
                    <button onclick="selectProduct('tasas')" id="btn_tasas" class="product-btn flex flex-col items-center gap-2 p-3
                    rounded-xl border-2 transition-all active:scale-95
                    border-yellow-400 bg-yellow-400/10 text-yellow-400">
                        <i class="fa-solid fa-chart-line text-lg"></i>
                        <div class="text-center">
                            <p class="text-[11px] font-black leading-tight">
                                TasasAlDía
                            </p>
                            <p class="text-[9px] opacity-60 font-bold">TASAS-XXXX</p>
                        </div>
                    </button>
                    <!-- PreciosAlDía -->
                    <button onclick="selectProduct('bodega')" id="btn_bodega" class="product-btn flex flex-col items-center gap-2 p-3
                    rounded-xl border-2 transition-all active:scale-95
                    border-slate-700 bg-slate-800/40 text-slate-400
                    hover:border-slate-500">
                        <i class="fa-solid fa-store text-lg"></i>
                        <div class="text-center">
                            <p class="text-[11px] font-black leading-tight">
                                PreciosAlDía
                            </p>
                            <p class="text-[9px] opacity-60 font-bold">PDA-XXXX</p>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Formulario principal -->
            <div class="glass rounded-2xl p-5 space-y-4">

                <!-- Header dinámico -->
                <div class="flex items-center gap-3">
                    <div id="productIcon" class="w-10 h-10 rounded-xl flex items-center justify-center

                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <div>
                        <h2 id="productTitle" class="text-base font-black text-white leading-tight">
                            TasasAlDía Premium
                        </h2>
                        <p id="productSub" class="text-[10px] text-slate-500 font-bold uppercase
                    tracking-wider">
                            Master Key Generator
                        </p>
                    </div>
                </div>

                <!-- Tipo de licencia -->
                <div>
                    <p class="text-[10px] font-black text-slate-500
              uppercase tracking-widest mb-2">
                        Tipo de licencia
                    </p>
                    <div class="flex gap-1.5">
                        <button onclick="setType('permanent')" id="type_permanent" class="type-btn flex-1 py-2 rounded-lg text-[10px] font-black
                    uppercase transition-all active:scale-95
                    bg-yellow-400 text-slate-900">
                            <i class="fa-solid fa-infinity mr-1"></i>Permanente
                        </button>
                        <button onclick="setType('demo30')" id="type_demo30" class="type-btn flex-1 py-2 rounded-lg text-[10px] font-black
                    uppercase transition-all active:scale-95
                    bg-slate-800/60 text-slate-400 border border-slate-700/60

                            30 días
                        </button>
                        <button onclick="setType('demo7')" id="type_demo7" class="type-btn flex-1 py-2 rounded-lg text-[10px] font-black
                    uppercase transition-all active:scale-95
                    bg-slate-800/60 text-slate-400 border border-slate-700/60
                    hover:border-slate-500">
                            7 días
                        </button>
                    </div>
                </div>

                <!-- Input Device ID -->
                <div>
                    <label class="block text-[10px] font-black text-slate-500
              uppercase tracking-widest mb-2">
                        ID del Dispositivo Cliente
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-fingerprint absolute left-3.5
                  top-1/2 -translate-y-1/2 text-slate-500
                  pointer-events-none text-sm"></i>
                        <input type="text" id="devId" placeholder="TASAS-XXXX o PDA-XXXX"
                            oninput="handleDeviceIdInput(this.value)" class="w-full bg-slate-900/60 border border-slate-700/50
                    text-white rounded-xl py-3.5 pl-10 pr-4
                    focus:outline-none focus:border-yellow-400
                    focus:ring-1 focus:ring-yellow-400/30 transition-all
                    font-mono text-sm shadow-inner">
                    </div>
                </div>

                <!-- Nota expiración -->
                <div id="expiryNote" class="hidden text-[10px] text-amber-400 font-bold
            bg-amber-950/30 border border-amber-500/20 rounded-lg
            px-3 py-2 flex items-center gap-2">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span id="expiryText"></span>
                </div>

                <!-- Generar -->
                <button onclick="generate()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-slate-900
            font-black rounded-xl py-3.5 transition-all active:scale-95
            flex items-center justify-center gap-2 shadow-lg
            shadow-yellow-400/10 text-sm uppercase tracking-wide">
                    <i class="fa-solid fa-bolt"></i>
                    Generar Licencia
                </button>
            </div>

            <!-- Resultado -->
            <div id="resultContainer" class="hidden glass rounded-2xl p-4 fade-in space-y-3">
                <div class="flex items-center justify-between">
                    <p class="text-[10px] font-black text-emerald-500
              uppercase tracking-widest">
                        Código Generado
                    </p>
                    <span id="typeBadge" class="text-[9px] font-black uppercase px-2 py-0.5
                rounded-full bg-emerald-900/40 text-emerald-400">
                        Permanente
                    </span>
                </div>

                <div class="flex items-center justify-between gap-3
          bg-slate-900/50 rounded-xl px-3 py-3 border
          border-slate-800/50">
                    <p id="resultText" class="font-mono text-xl font-black text-emerald-400
                tracking-wider truncate"></p>
                    <button onclick="copyCode()" class="shrink-0 w-9 h-9 rounded-lg bg-emerald-900/40
                text-emerald-400 hover:bg-emerald-900/70
                hover:text-white transition-all flex items-center
                justify-center">
                        <i id="copyIcon" class="fa-regular fa-copy text-sm"></i>
                    </button>
                </div>

                <p id="expiryResult" class="text-[10px] text-amber-400 font-bold hidden"></p>

                <!-- Info del dispositivo -->
                <div class="flex items-center gap-2 text-[10px] text-slate-500
          font-bold">
                    <i class="fa-solid fa-mobile-screen-button opacity-50"></i>
                    <span id="deviceInfo"></span>
                    <span class="opacity-40 mx-1">·</span>
                    <span id="productInfo" class="text-yellow-400/70"></span>
                </div>

                <!-- WhatsApp -->
                <button onclick="sendWhatsApp()" class="w-full bg-[#25D366]/10 hover:bg-[#25D366]/20
            text-[#25D366] font-bold border border-[#25D366]/20
            rounded-xl py-2.5 transition-all active:scale-95
            flex items-center justify-center gap-2 text-sm">
                    <i class="fa-brands fa-whatsapp"></i>
                    Enviar por WhatsApp
                </button>
            </div>

            <!-- Log de sesión -->
            <div id="logSection" class="hidden glass rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-[10px] font-black text-slate-500
                  uppercase tracking-widest flex items-center gap-1.5">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        Historial de sesión
                    </p>
                    <button onclick="clearLog()" class="text-[9px] text-slate-600 hover:text-rose-400
                    font-black uppercase transition-colors">
                        Limpiar
                    </button>
                </div>
                <div id="logList" class="space-y-2 max-h-48 overflow-y-auto">
                </div>
            </div>
        </div>

        <!-- ════════════════════════════
             TAB: DASHBOARD
        ════════════════════════════ -->
        <div id="view_dash" class="hidden space-y-4">

            <!-- Stats -->
            <div class="grid grid-cols-2 gap-2">
                <div class="glass rounded-xl p-3 flex flex-col items-center text-center">
                    <i class="fa-solid fa-chart-line text-yellow-400 mb-1 text-lg"></i>
                    <p class="text-[10px] text-slate-400 uppercase font-black">TasasAlDía</p>
                    <p id="stats_tasas" class="text-lg font-black text-white">-</p>
                </div>
                <div class="glass rounded-xl p-3 flex flex-col items-center text-center">
                    <i class="fa-solid fa-store text-emerald-400 mb-1 text-lg"></i>
                    <p class="text-[10px] text-slate-400 uppercase font-black">PreciosAlDía</p>
                    <p id="stats_bodega" class="text-lg font-black text-white">-</p>
                </div>
            </div>

            <!-- Licencias Panel -->
            <div class="glass rounded-2xl p-4 flex flex-col">
                <!-- Header + Search -->
                <div class="flex items-center justify-between mb-3">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        Gestión de Licencias
                    </p>
                    <button onclick="loadDashboard()" class="text-slate-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-arrows-rotate"></i>
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="relative mb-3">
                    <i
                        class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input id="dashSearch" type="text" placeholder="Buscar por ID de dispositivo..."
                        oninput="applyDashFilters()"
                        class="w-full pl-9 pr-3 py-2.5 bg-slate-900/60 border border-slate-700/50 rounded-xl text-xs text-white placeholder-slate-500 font-bold focus:border-emerald-500/50 focus:outline-none transition-colors" />
                </div>

                <!-- Filter Chips -->
                <div class="flex flex-wrap gap-1.5 mb-3">
                    <!-- Estado -->
                    <button onclick="toggleFilter(this, 'status', 'active')" data-active="false"
                        class="dash-filter-chip text-[9px] font-black uppercase px-2.5 py-1 rounded-full border transition-all bg-slate-800/50 text-slate-500 border-slate-700/40 hover:border-emerald-500/50">
                        <i class="fa-solid fa-check mr-0.5"></i> Activa
                    </button>
                    <button onclick="toggleFilter(this, 'status', 'revoked')" data-active="false"
                        class="dash-filter-chip text-[9px] font-black uppercase px-2.5 py-1 rounded-full border transition-all bg-slate-800/50 text-slate-500 border-slate-700/40 hover:border-rose-500/50">
                        <i class="fa-solid fa-xmark mr-0.5"></i> Revocada
                    </button>
                    <span class="w-px h-5 bg-slate-700/50 self-center mx-0.5"></span>
                    <!-- Producto -->
                    <button onclick="toggleFilter(this, 'product', 'tasas')" data-active="false"
                        class="dash-filter-chip text-[9px] font-black uppercase px-2.5 py-1 rounded-full border transition-all bg-slate-800/50 text-slate-500 border-slate-700/40 hover:border-yellow-500/50">
                        <i class="fa-solid fa-chart-line mr-0.5"></i> Tasas
                    </button>
                    <button onclick="toggleFilter(this, 'product', 'bodega')" data-active="false"
                        class="dash-filter-chip text-[9px] font-black uppercase px-2.5 py-1 rounded-full border transition-all bg-slate-800/50 text-slate-500 border-slate-700/40 hover:border-emerald-500/50">
                        <i class="fa-solid fa-store mr-0.5"></i> Precios
                    </button>
                    <span class="w-px h-5 bg-slate-700/50 self-center mx-0.5"></span>
                    <!-- Tipo -->
                    <button onclick="toggleFilter(this, 'type', 'permanent')" data-active="false"
                        class="dash-filter-chip text-[9px] font-black uppercase px-2.5 py-1 rounded-full border transition-all bg-slate-800/50 text-slate-500 border-slate-700/40 hover:border-sky-500/50">
                        ∞ Perm
                    </button>
                    <button onclick="toggleFilter(this, 'type', 'demo7')" data-active="false"
                        class="dash-filter-chip text-[9px] font-black uppercase px-2.5 py-1 rounded-full border transition-all bg-slate-800/50 text-slate-500 border-slate-700/40 hover:border-amber-500/50">
                        7d
                    </button>
                    <button onclick="toggleFilter(this, 'type', 'demo30')" data-active="false"
                        class="dash-filter-chip text-[9px] font-black uppercase px-2.5 py-1 rounded-full border transition-all bg-slate-800/50 text-slate-500 border-slate-700/40 hover:border-amber-500/50">
                        30d
                    </button>
                </div>

                <!-- License List -->
                <div id="dashList" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar max-h-[400px]">
                    <div class="text-center py-10 text-slate-500">
                        <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2"></i>
                        <p class="text-xs">Cargando...</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="dashPagination"
                    class="flex items-center justify-between mt-3 pt-3 border-t border-slate-800/50">
                    <p id="dashCount" class="text-[9px] font-bold text-slate-500">0 resultados</p>
                    <div class="flex items-center gap-1">
                        <button onclick="dashChangePage(-1)" id="dashPrevBtn" disabled
                            class="text-[9px] font-black text-slate-400 bg-slate-800/50 hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed px-2 py-1 rounded transition-colors">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <span id="dashPageInfo" class="text-[9px] font-bold text-slate-500 px-2">1/1</span>
                        <button onclick="dashChangePage(1)" id="dashNextBtn" disabled
                            class="text-[9px] font-black text-slate-400 bg-slate-800/50 hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed px-2 py-1 rounded transition-colors">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 px-4 py-2.5
    bg-slate-800 text-white text-xs font-bold rounded-full
    border border-slate-700 shadow-2xl opacity-0
    translate-y-[-12px] transition-all duration-300
    pointer-events-none z-50 flex items-center gap-2">
        <i id="toastIcon" class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toastMsg">OK</span>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // CONFIGURACIÓN CENTRAL — SOLO EDITAR AQUÍ
        // ═══════════════════════════════════════════

        const ADMIN_PIN = 'Lvbp1994**'     // Cambia esto a tu PIN secreto
        const ADMIN_WA = '584124051793'   // Tu WhatsApp

        const SUPABASE_URL = 'https://jjbzevntreoxpuofgkyi.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqYnpldm50cmVveHB1b2Zna3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NjE4MDIsImV4cCI6MjA4NzAzNzgwMn0.wyyISEMsTEl__QgeckSVWgX1isif8iZOblO8GNso-TQ'  // anon key del proyecto
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        // Claves DEBEN ser idénticas a cada app
        const PRODUCTS = {
            tasas: {
                name: 'TasasAlDía Premium',
                shortName: 'TasasAlDía',
                icon: 'fa-chart-line',
                color: '#fcd535',
                salt: 'VENEZUELA_PRO_2026_GLOBAL',  // = MASTER_SECRET_KEY en useSecurity.js de TasasAlDía
                idPrefix: 'TASAS',
                tokenKey: 'premium_token',           // = localStorage key en TasasAlDía
            },
            bodega: {
                name: 'PreciosAlDía Business',
                shortName: 'PreciosAlDía',
                icon: 'fa-store',
                color: '#10b981',
                salt: 'PRECIOS_ALDIA_BODEGA_2026',  // = VITE_LICENSE_SALT en .env de PreciosAlDía
                idPrefix: 'PDA',
                tokenKey: 'pda_premium_token',       // = localStorage key en PreciosAlDía
            },
        }

        // ═══════════════════════════════════════════
        // ESTADO
        // ═══════════════════════════════════════════
        let currentProduct = 'tasas'
        let currentType = 'permanent'
        let sessionLog = []
        let lastGenerated = null

        // ═══════════════════════════════════════════
        // SELECCIÓN DE PRODUCTO
        // ═══════════════════════════════════════════
        function selectProduct(id) {
            currentProduct = id
            const p = PRODUCTS[id]

            // Actualizar botones de producto
            Object.keys(PRODUCTS).forEach(k => {
                const btn = document.getElementById(`btn_${k}`)
                const prod = PRODUCTS[k]
                if (k === id) {
                    btn.className = btn.className
                        .replace('border-slate-700 bg-slate-800/40 text-slate-400 hover:border-slate-500', '')
                    btn.style.borderColor = prod.color
                    btn.style.color = prod.color
                    btn.style.backgroundColor = prod.color + '18'
                } else {
                    btn.style.borderColor = ''
                    btn.style.color = ''
                    btn.style.backgroundColor = ''
                    btn.className = btn.className + ' border-slate-700 bg-slate-800/40 text-slate-400'
                }
            })

            // Actualizar header
            document.getElementById('productIcon').innerHTML =
                `<i class="fa-solid ${p.icon}"></i>`
            document.getElementById('productIcon').style.color = p.color
            document.getElementById('productIcon').style.borderColor = p.color + '40'
            document.getElementById('productIcon').style.backgroundColor = p.color + '15'
            document.getElementById('productTitle').innerText = p.name
            document.getElementById('productSub').innerText = `${p.idPrefix}-XXXX · Key Generator`

            // Actualizar placeholder
            document.getElementById('devId').placeholder =
                `${p.idPrefix}-XXXX`

            // Limpiar resultado
            document.getElementById('resultContainer').classList.add('hidden')
            document.getElementById('resultContainer').classList.remove('fade-in')
        }

        // ═══════════════════════════════════════════
        // TIPO DE LICENCIA
        // ═══════════════════════════════════════════
        function setType(type) {
            currentType = type
            const types = ['permanent', 'demo30', 'demo7']
            types.forEach(t => {
                const btn = document.getElementById(`type_${t}`)
                if (t === type) {
                    btn.style.backgroundColor = PRODUCTS[currentProduct].color
                    btn.style.color = '#0f172a'
                    btn.style.borderColor = 'transparent'
                } else {
                    btn.style.backgroundColor = ''
                    btn.style.color = ''
                    btn.style.borderColor = ''
                }
            })

            const note = document.getElementById('expiryNote')
            const noteText = document.getElementById('expiryText')
            if (type === 'permanent') {
                note.classList.add('hidden')
            } else {
                note.classList.remove('hidden')
                note.classList.add('flex')
                noteText.innerText = type === 'demo30'
                    ? 'Licencia temporal — expira en 30 días'
                    : 'Licencia temporal — expira en 7 días'
            }

            document.getElementById('resultContainer').classList.add('hidden')
        }

        // ═══════════════════════════════════════════
        // AUTODETECT PRODUCT FROM DEVICE ID PREFIX
        // ═══════════════════════════════════════════
        function handleDeviceIdInput(val) {
            const v = val.trim().toUpperCase()
            if (v.startsWith('TAS') && currentProduct !== 'tasas') {
                selectProduct('tasas')
            } else if (v.startsWith('PDA') && currentProduct !== 'bodega') {
                selectProduct('bodega')
            }
        }

        // ═══════════════════════════════════════════
        // GENERADOR SHA-256
        // ═══════════════════════════════════════════
        document.getElementById('devId')
            .addEventListener('keypress', e => {
                if (e.key === 'Enter') generate()
            })

        async function generate() {
            const devId = document.getElementById('devId').value.trim().toUpperCase()
            if (!devId) {
                showToast('Introduce el ID del dispositivo', 'error')
                document.getElementById('devId').focus()
                return
            }

            const p = PRODUCTS[currentProduct]

            try {
                const encoder = new TextEncoder()
                const data = encoder.encode(devId + p.salt)
                const hash = await crypto.subtle.digest('SHA-256', data)
                const hex = Array.from(new Uint8Array(hash))
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('').toUpperCase()

                const code = `ACTIV-${hex.slice(0, 4)}-${hex.slice(4, 8)}`

                // Calcular expiración
                let expiresAt = null
                let expiresText = null
                const days = currentType === 'demo30' ? 30
                    : currentType === 'demo7' ? 7 : 0
                if (days > 0) {
                    expiresAt = Date.now() + days * 24 * 60 * 60 * 1000
                    expiresText = `Expira el ${new Date(expiresAt)
                        .toLocaleDateString('es-VE', {
                            day: '2-digit', month: 'long', year: 'numeric'
                        })}`
                }

                lastGenerated = {
                    code, devId, expiresAt, expiresText,
                    product: currentProduct,
                    type: currentType,
                }

                // Mostrar resultado
                document.getElementById('resultText').innerText = code
                document.getElementById('typeBadge').innerText =
                    currentType === 'permanent' ? 'Permanente'
                        : currentType === 'demo30' ? '30 días' : '7 días'
                document.getElementById('deviceInfo').innerText = devId
                document.getElementById('productInfo').innerText = p.shortName

                const expEl = document.getElementById('expiryResult')
                if (expiresText) {
                    expEl.innerText = expiresText
                    expEl.classList.remove('hidden')
                } else {
                    expEl.classList.add('hidden')
                }

                const container = document.getElementById('resultContainer')
                container.classList.remove('hidden', 'fade-in')
                void container.offsetWidth
                container.classList.add('fade-in')

                addToLog(devId, code, currentType, expiresText, p.shortName)

                // Guardar en Supabase
                db.from('licenses').upsert({
                    device_id: devId,
                    product_id: currentProduct,
                    type: currentType,
                    active: true,
                    expires_at: expiresAt
                        ? new Date(expiresAt).toISOString()
                        : null,
                    code: code,
                }, { onConflict: 'device_id,product_id' })
                    .then(({ error }) => {
                        if (!error) showToast('Licencia registrada en sistema ✓')
                    })
                    .catch(() => { })  // nunca bloquear si falla la red

            } catch (err) {
                console.error(err)
                showToast('Error generando código', 'error')
            }
        }

        // ═══════════════════════════════════════════
        // COPIAR
        // ═══════════════════════════════════════════
        function copyCode() {
            const text = document.getElementById('resultText').innerText
            if (!text) return
            navigator.clipboard.writeText(text).then(() => {
                showToast('Código copiado')
                const icon = document.getElementById('copyIcon')
                icon.className = 'fa-solid fa-check text-sm'
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy text-sm'
                }, 2000)
            }).catch(() => {
                showToast('Error al copiar — copie manualmente', 'error')
            })
        }

        // ═══════════════════════════════════════════
        // WHATSAPP
        // ═══════════════════════════════════════════
        function sendWhatsApp() {
            if (!lastGenerated) return
            const { code, devId, type, expiresText, product } = lastGenerated
            const p = PRODUCTS[product]
            const tipoLabel =
                type === 'permanent' ? 'Licencia Permanente'
                    : type === 'demo30' ? 'Licencia 30 días'
                        : 'Licencia 7 días'

            const lines = [
                `*${p.name}*`,
                `━━━━━━━━━━━━━━━━━━`,
                `Tipo: ${tipoLabel}`,
                `Dispositivo: ${devId}`,
                `Codigo: *${code}*`,
                expiresText || null,
                `━━━━━━━━━━━━━━━━━━`,
                `Ingresa el codigo en la app:`,
                `Configuracion > Activar Licencia`,
            ].filter(Boolean).join('\n')

            window.open(
                `https://wa.me/?text=${encodeURIComponent(lines)}`,
                '_blank'
            )
        }

        // ═══════════════════════════════════════════
        // LOG DE SESIÓN
        // ═══════════════════════════════════════════
        function addToLog(devId, code, type, expiresText, productName) {
            sessionLog.unshift({ devId, code, type, expiresText, productName })
            const section = document.getElementById('logSection')
            const list = document.getElementById('logList')
            section.classList.remove('hidden')
            list.innerHTML = sessionLog.slice(0, 15).map((e, i) => `
        <div class="flex items-center justify-between gap-2 px-3 py-2
          bg-slate-900/50 rounded-xl border border-slate-800/40">
            <div class="min-w-0">
                <p class="text-[10px] font-mono font-black
                  text-slate-300 truncate">
                  ${e.devId}
                  <span class="text-[8px] text-slate-600
                    font-bold ml-1 uppercase">${e.productName}</span>
                </p>
                <p class="text-[9px] text-slate-600 font-bold
                  font-mono mt-0.5">
                  ${e.code}
                  <span class="normal-case ml-1">
                    ${e.type !== 'permanent'
                    ? '· ' + (e.expiresText || '')
                    : '· Permanente'}
                  </span>
                </p>
            </div>
            <button onclick="navigator.clipboard.writeText('${e.code}')
              .then(()=>showToast('Copiado'))"
              class="shrink-0 text-slate-600 hover:text-emerald-400
                transition-colors p-1.5 rounded-lg hover:bg-slate-800">
                <i class="fa-regular fa-copy text-xs"></i>
            </button>
        </div>
    `).join('')
        }

        function clearLog() {
            sessionLog = []
            document.getElementById('logSection').classList.add('hidden')
            document.getElementById('logList').innerHTML = ''
        }

        // ═══════════════════════════════════════════
        // TOAST
        // ═══════════════════════════════════════════
        let toastTimer
        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast')
            const icon = document.getElementById('toastIcon')
            const text = document.getElementById('toastMsg')
            text.innerText = msg
            icon.className = type === 'error'
                ? 'fa-solid fa-triangle-exclamation text-rose-400'
                : 'fa-solid fa-circle-check text-emerald-400'
            el.style.opacity = '1'
            el.style.transform = 'translate(-50%, 0)'
            clearTimeout(toastTimer)
            toastTimer = setTimeout(() => {
                el.style.opacity = '0'
                el.style.transform = 'translate(-50%, -12px)'
            }, 3000)
        }

        // ═══════════════════════════════════════════
        // DASHBOARD Y TABS
        // ═══════════════════════════════════════════
        function switchTab(tabId) {
            document.getElementById('view_gen').classList.add('hidden')
            document.getElementById('view_dash').classList.add('hidden')

            document.getElementById('tab_gen').className = 'flex-1 py-2 text-xs font-black uppercase text-slate-400 hover:text-white transition-all active:scale-95'
            document.getElementById('tab_dash').className = 'flex-1 py-2 text-xs font-black uppercase text-slate-400 hover:text-white transition-all active:scale-95'

            document.getElementById(`view_${tabId}`).classList.remove('hidden')
            document.getElementById(`view_${tabId}`).classList.add('fade-in')

            const activeTab = document.getElementById(`tab_${tabId}`)
            activeTab.className = 'flex-1 py-2 text-xs font-black uppercase text-slate-900 bg-yellow-400 rounded-lg transition-all active:scale-95'

            if (tabId === 'dash') {
                loadDashboard()
            }
        }

        // Leer tab de la URL para abrir la vista correcta (shortcuts PWA)
        const urlParams = new URLSearchParams(window.location.search);
        const deepTab = urlParams.get('tab');
        if (deepTab) {
            try {
                switchTab(deepTab);
            } catch (e) {
                // Si aún no se puede (por el PIN), se maneja después
            }
        }

        // ═══════════════════════════════════
        // DASHBOARD — Filter / Search / Pagination State
        // ═══════════════════════════════════
        let allLicenses = [];
        let allDemos = [];
        let dashFilters = { status: [], product: [], type: [] };
        let dashCurrentPage = 1;
        const DASH_PAGE_SIZE = 10;

        function toggleFilter(btn, category, value) {
            const isActive = btn.dataset.active === 'true';
            btn.dataset.active = isActive ? 'false' : 'true';

            if (isActive) {
                btn.classList.remove('bg-emerald-900/40', 'text-emerald-400', 'border-emerald-500/30',
                    'bg-rose-900/40', 'text-rose-400', 'border-rose-500/30',
                    'bg-yellow-900/40', 'text-yellow-400', 'border-yellow-500/30',
                    'bg-sky-900/40', 'text-sky-400', 'border-sky-500/30',
                    'bg-amber-900/40', 'text-amber-400', 'border-amber-500/30');
                btn.classList.add('bg-slate-800/50', 'text-slate-500', 'border-slate-700/40');
                dashFilters[category] = dashFilters[category].filter(v => v !== value);
            } else {
                btn.classList.remove('bg-slate-800/50', 'text-slate-500', 'border-slate-700/40');
                const colorMap = {
                    'status-active': ['bg-emerald-900/40', 'text-emerald-400', 'border-emerald-500/30'],
                    'status-revoked': ['bg-rose-900/40', 'text-rose-400', 'border-rose-500/30'],
                    'product-tasas': ['bg-yellow-900/40', 'text-yellow-400', 'border-yellow-500/30'],
                    'product-bodega': ['bg-emerald-900/40', 'text-emerald-400', 'border-emerald-500/30'],
                    'type-permanent': ['bg-sky-900/40', 'text-sky-400', 'border-sky-500/30'],
                    'type-demo7': ['bg-amber-900/40', 'text-amber-400', 'border-amber-500/30'],
                    'type-demo30': ['bg-amber-900/40', 'text-amber-400', 'border-amber-500/30'],
                };
                const classes = colorMap[`${category}-${value}`] || ['bg-slate-600', 'text-white', 'border-slate-500'];
                btn.classList.add(...classes);
                dashFilters[category].push(value);
            }

            dashCurrentPage = 1;
            applyDashFilters();
        }

        function applyDashFilters() {
            const searchTerm = (document.getElementById('dashSearch')?.value || '').trim().toUpperCase();
            let filtered = [...allLicenses];

            // Search
            if (searchTerm) {
                filtered = filtered.filter(l => l.device_id.toUpperCase().includes(searchTerm));
            }

            // Status filter
            if (dashFilters.status.length > 0) {
                filtered = filtered.filter(l => {
                    if (dashFilters.status.includes('active') && l.active) return true;
                    if (dashFilters.status.includes('revoked') && !l.active) return true;
                    return false;
                });
            }

            // Product filter
            if (dashFilters.product.length > 0) {
                filtered = filtered.filter(l => dashFilters.product.includes(l.product_id));
            }

            // Type filter
            if (dashFilters.type.length > 0) {
                filtered = filtered.filter(l => dashFilters.type.includes(l.type));
            }

            renderFilteredLicenses(filtered);
        }

        function renderFilteredLicenses(filtered) {
            const listEl = document.getElementById('dashList');
            const totalPages = Math.max(1, Math.ceil(filtered.length / DASH_PAGE_SIZE));
            if (dashCurrentPage > totalPages) dashCurrentPage = totalPages;

            const start = (dashCurrentPage - 1) * DASH_PAGE_SIZE;
            const pageItems = filtered.slice(start, start + DASH_PAGE_SIZE);

            // Count
            document.getElementById('dashCount').textContent = `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`;
            document.getElementById('dashPageInfo').textContent = `${dashCurrentPage}/${totalPages}`;
            document.getElementById('dashPrevBtn').disabled = dashCurrentPage <= 1;
            document.getElementById('dashNextBtn').disabled = dashCurrentPage >= totalPages;

            if (pageItems.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-10 text-slate-500">
                        <i class="fa-solid fa-filter-circle-xmark text-2xl mb-2 opacity-50"></i>
                        <p class="text-xs">Sin resultados con estos filtros</p>
                    </div>`;
                return;
            }

            listEl.innerHTML = pageItems.map(l => renderLicenseCard(l)).join('');
        }

        function renderLicenseCard(l) {
            const isTypePerm = l.type === 'permanent';
            const labelTipo = isTypePerm ? 'PERMANENTE' : (l.type === 'demo30' ? '30 DÍAS' : '7 DÍAS');

            const badgeClass = l.active
                ? 'bg-emerald-900/40 text-emerald-400 border-emerald-500/20'
                : 'bg-rose-900/40 text-rose-400 border-rose-500/20';
            const badgeIcon = l.active ? 'fa-check' : 'fa-xmark';
            const badgeText = l.active ? 'Activa' : 'Revocada';

            const prodColor = l.apps?.color || '#94a3b8';
            const prodName = l.apps?.short_name || l.product_id;

            const actionBtns = l.active ? `
                <button onclick="revokeLicense('${l.id}')" class="shrink-0 text-[9px] font-black text-rose-400 bg-rose-400/10 hover:bg-rose-400 hover:text-white px-2 py-1 rounded transition-colors uppercase border border-rose-400/20">
                    Revocar
                </button>
            ` : `
                <div class="flex gap-1">
                    <button onclick="reactivateLicense('${l.id}')" class="shrink-0 text-[9px] font-black text-emerald-400 bg-emerald-400/10 hover:bg-emerald-400 hover:text-white px-2 py-1 rounded transition-colors uppercase border border-emerald-400/20">
                        Reactivar
                    </button>
                    <button onclick="deleteLicense('${l.id}', '${l.device_id}')" class="shrink-0 text-[9px] font-black text-rose-400 bg-rose-400/10 hover:bg-rose-400 hover:text-white px-2 py-1 rounded transition-colors uppercase border border-rose-400/20">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `;

            return `
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-3 flex flex-col gap-2">
                <div class="flex items-start justify-between">
                    <div>
                        <div class="flex items-center gap-1.5 mb-1">
                            <h3 class="font-mono text-sm font-black text-white leading-none">${l.device_id}</h3>
                            <div class="px-1.5 py-0.5 rounded text-[8px] font-black uppercase border ${badgeClass}">
                                <i class="fa-solid ${badgeIcon} mr-0.5"></i> ${badgeText}
                            </div>
                        </div>
                        <p class="text-[10px] font-bold uppercase" style="color: ${prodColor}">${prodName}</p>
                    </div>
                    ${actionBtns}
                </div>
                <div class="flex items-center gap-3 text-[9px] text-slate-500 font-bold border-t border-slate-800/50 pt-2 mt-1">
                    <span><i class="fa-solid fa-tag"></i> ${labelTipo}</span>
                    <span><i class="fa-regular fa-calendar"></i> ${new Date(l.created_at).toLocaleDateString('es-VE')}</span>
                </div>
            </div>`;
        }

        function dashChangePage(delta) {
            dashCurrentPage += delta;
            applyDashFilters();
        }

        async function loadDashboard() {
            const listEl = document.getElementById('dashList')
            listEl.innerHTML = `
                <div class="text-center py-10 text-slate-500">
                    <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2"></i>
                    <p class="text-xs">Cargando...</p>
                </div>
            `

            try {
                // Get ALL licenses (no limit for full filtering)
                const { data: licenseData, error } = await db
                    .from('licenses')
                    .select('*, apps(name, color, short_name)')
                    .order('created_at', { ascending: false })

                if (error) throw error

                allLicenses = licenseData || [];

                // Get demos
                const { data: demoData } = await db
                    .from('demos')
                    .select('device_id, product_id, expires_at, activated_at, app_version')
                    .order('activated_at', { ascending: false })

                allDemos = demoData || [];

                // Demo stats helpers
                const demosActivas = (pid) =>
                    allDemos.filter(d =>
                        d.product_id === pid &&
                        new Date(d.expires_at) > new Date()
                    ).length

                const demosExpiradas = (pid) =>
                    allDemos.filter(d =>
                        d.product_id === pid &&
                        new Date(d.expires_at) <= new Date()
                    ).length

                // Update Stats
                const tasasCount = allLicenses.filter(l => l.product_id === 'tasas').length
                const bodegaCount = allLicenses.filter(l => l.product_id === 'bodega').length

                document.getElementById('stats_tasas').innerHTML = `
                    <span class="text-lg font-black text-white">${tasasCount}</span>
                    <span class="text-[9px] text-yellow-400 font-bold block mt-0.5">
                        ${demosActivas('tasas')} demos activas
                    </span>
                    <span class="text-[9px] text-slate-600 font-bold block">
                        ${demosExpiradas('tasas')} expiradas
                    </span>`

                document.getElementById('stats_bodega').innerHTML = `
                    <span class="text-lg font-black text-white">${bodegaCount}</span>
                    <span class="text-[9px] text-emerald-400 font-bold block mt-0.5">
                        ${demosActivas('bodega')} demos activas
                    </span>
                    <span class="text-[9px] text-slate-600 font-bold block">
                        ${demosExpiradas('bodega')} expiradas
                    </span>`

                // Apply current filters
                applyDashFilters();

            } catch (err) {
                console.error(err)
                listEl.innerHTML = `
                    <div class="text-center py-10 text-rose-400">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i>
                        <p class="text-xs">Error al cargar dashboard</p>
                    </div>
                `
            }
        }

        async function revokeLicense(id) {
            const confirmed = await showConfirmModal(
                'Revocar Licencia',
                'Esta acción desactivará la licencia del dispositivo asociado. El cliente perderá acceso en su próxima verificación.',
                'Confirmar Revocación',
                'Cancelar'
            )
            if (!confirmed) return;

            try {
                showToast('Procesando revocación...', 'success')
                const { error } = await db.from('licenses')
                    .update({ active: false })
                    .eq('id', id);

                if (error) throw error;
                showToast('Licencia revocada exitosamente', 'success')
                loadDashboard()
            } catch (err) {
                console.error(err);
                showToast('Error al procesar la revocación', 'error')
            }
        }

        async function reactivateLicense(id) {
            const confirmed = await showConfirmModal(
                'Reactivar Licencia',
                '¿Deseas reactivar esta licencia? El cliente podrá usar la app de nuevo.',
                'Reactivar',
                'Cancelar'
            )
            if (!confirmed) return;

            try {
                showToast('Reactivando...', 'success')
                const { error } = await db.from('licenses')
                    .update({ active: true })
                    .eq('id', id);

                if (error) throw error;
                showToast('Licencia reactivada ✓', 'success')
                loadDashboard()
            } catch (err) {
                console.error(err);
                showToast('Error al reactivar', 'error')
            }
        }

        async function deleteLicense(id, deviceId) {
            // DOBLE CONFIRMACIÓN
            const first = await showConfirmModal(
                'Eliminar Licencia',
                `¿Estás seguro de eliminar permanentemente la licencia de <b>${deviceId}</b>? Esta acción NO se puede deshacer.`,
                'Sí, eliminar',
                'Cancelar'
            )
            if (!first) return;

            const second = await showConfirmModal(
                '⚠️ Confirmación Final',
                `Escribimos de nuevo: se eliminará <b>${deviceId}</b> de la base de datos para siempre. ¿Confirmas?`,
                'Eliminar definitivamente',
                'No, cancelar'
            )
            if (!second) return;

            try {
                showToast('Eliminando...', 'success')
                const { error } = await db.from('licenses')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                showToast('Licencia eliminada permanentemente', 'success')
                loadDashboard()
            } catch (err) {
                console.error(err);
                showToast('Error al eliminar', 'error')
            }
        }

        // PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => { })
            })
        }

        // ═══════════════════════════════════
        // Custom Confirm Modal
        // ═══════════════════════════════════
        function showConfirmModal(title, message, confirmText = 'Confirmar', cancelText = 'Cancelar') {
            return new Promise((resolve) => {
                // Remove any existing modal
                const existing = document.getElementById('confirmModal')
                if (existing) existing.remove()

                const overlay = document.createElement('div')
                overlay.id = 'confirmModal'
                overlay.className = 'modal-overlay'
                overlay.innerHTML = `
                    <div class="modal-box">
                        <div class="modal-icon">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                        <h3 style="text-align:center; font-size:0.95rem; font-weight:800; color:#f1f5f9; margin-bottom:0.5rem; letter-spacing:-0.01em;">${title}</h3>
                        <p style="text-align:center; font-size:0.75rem; color:#94a3b8; line-height:1.5; margin-bottom:1.25rem;">${message}</p>
                        <div style="display:flex; gap:0.5rem;">
                            <button id="modalCancel" style="flex:1; padding:0.6rem; border-radius:0.6rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; background:rgba(51,65,85,0.5); border:1px solid rgba(100,116,139,0.2); color:#94a3b8; cursor:pointer; transition:all 0.15s;">${cancelText}</button>
                            <button id="modalConfirm" style="flex:1; padding:0.6rem; border-radius:0.6rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#f87171; cursor:pointer; transition:all 0.15s;">${confirmText}</button>
                        </div>
                    </div>
                `

                document.body.appendChild(overlay)
                requestAnimationFrame(() => overlay.classList.add('active'))

                const close = (result) => {
                    overlay.classList.remove('active')
                    setTimeout(() => overlay.remove(), 200)
                    resolve(result)
                }

                overlay.querySelector('#modalConfirm').onclick = () => close(true)
                overlay.querySelector('#modalCancel').onclick = () => close(false)
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) close(false)
                })
            })
        }

        // PWA — registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(() => { });
            });
        }
    </script>
