<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Key Gen - TasasAlDía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            text-transform: uppercase;
        }

        input::placeholder {
            text-transform: none;
            color: #475569;
        }

        /* Hide scrollbar for cleaner look on mobile */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-sm rounded-[2rem] p-6 sm:p-8 relative overflow-hidden">

        <!-- Decorative Glow -->
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-brand/20 blur-3xl rounded-full pointer-events-none"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-blue-500/10 blur-3xl rounded-full pointer-events-none">
        </div>

        <div class="relative z-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-slate-800/50 border border-slate-700/50 mb-4 text-[#fcd535] shadow-lg">
                    <i class="fa-solid fa-key text-xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight text-white">TasasAlDía <span
                        class="text-[#fcd535]">VIP</span></h1>
                <p class="text-xs font-semibold text-slate-400 mt-1 uppercase tracking-widest">Master Key Generator</p>
            </div>

            <!-- Input Form -->
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">ID del
                        Cliente</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-solid fa-fingerprint text-slate-500"></i>
                        </div>
                        <input type="text" id="devId" placeholder="TASAS-XXXX"
                            class="w-full bg-slate-900/50 border border-slate-700/50 text-white rounded-xl py-3.5 pl-10 pr-4 focus:outline-none focus:border-[#fcd535] focus:ring-1 focus:ring-[#fcd535] transition-all font-mono text-sm shadow-inner placeholder:font-sans">
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="space-y-3 pt-2">
                    <button onclick="generate()"
                        class="w-full bg-[#fcd535] hover:bg-[#eab308] text-slate-900 font-bold rounded-xl py-3.5 px-4 transition-all active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-[#fcd535]/10">
                        <i class="fa-solid fa-bolt"></i>
                        <span>Generar Licencia Premium</span>
                    </button>

                    <button onclick="setDemo()"
                        class="w-full bg-slate-800/50 hover:bg-slate-700/50 text-slate-300 font-bold border border-slate-700/50 rounded-xl py-3.5 px-4 transition-all active:scale-95 flex items-center justify-center gap-2 text-sm">
                        <i class="fa-solid fa-clock opacity-70"></i>
                        <span>Generar Licencia Demo (24h)</span>
                    </button>
                </div>
            </div>

            <!-- Result Area -->
            <div id="resultContainer" class="mt-6 hidden animate-in fade-in slide-in-from-bottom-2 duration-300">
                <div class="p-4 rounded-xl bg-emerald-950/30 border border-emerald-500/20 relative group">
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-2">Código Generado</p>
                    <div class="flex items-center justify-between gap-3">
                        <p id="resultText"
                            class="font-mono text-lg sm:text-xl font-bold text-emerald-400 tracking-wider truncate"></p>
                        <button onclick="copyToClipboard()"
                            class="shrink-0 w-10 h-10 rounded-lg bg-emerald-900/40 text-emerald-400 hover:bg-emerald-900/60 hover:text-white transition-all flex items-center justify-center"
                            title="Copiar al portapapeles">
                            <i id="copyIcon" class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        class="fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 bg-slate-800 text-white text-xs font-bold rounded-full border border-slate-700 shadow-xl opacity-0 translate-y-[-10px] transition-all duration-300 pointer-events-none z-50 flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toastMessage">Código copiado</span>
    </div>

    <script>
        // ESTA CLAVE DEBE SER LA MISMA QUE EN useSecurity.js
        const MASTER_SECRET_KEY = "VENEZUELA_PRO_2026_GLOBAL";

        // Configuración de Theme
        const themeColor = "#fcd535";
        document.documentElement.style.setProperty('--brand-color', themeColor);

        // Permitir enter para generar
        document.getElementById('devId').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') generate();
        });

        function setDemo() {
            document.getElementById('devId').value = 'TASAS-DEMO';
            generate();
        }

        async function generate() {
            const devId = document.getElementById('devId').value.trim().toUpperCase();

            if (!devId) {
                showToast("Por favor, introduce el ID del cliente", "error");
                document.getElementById('devId').focus();
                return;
            }

            try {
                // Generador SHA-256
                const encoder = new TextEncoder();
                const data = encoder.encode(devId + MASTER_SECRET_KEY);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

                const finalKey = `ACTIV-${hashHex.substring(0, 4)}-${hashHex.substring(4, 8)}`;

                // Mostrar resultado
                const container = document.getElementById('resultContainer');
                const textEl = document.getElementById('resultText');

                textEl.innerText = finalKey;
                container.classList.remove('hidden');

                // Efecto de aparición suave si ya estaba visible
                container.classList.remove('animate-in');
                void container.offsetWidth; // trigger reflow
                container.classList.add('animate-in');
            } catch (err) {
                console.error(err);
                showToast("Error generando código. Use un navegador moderno.", "error");
            }
        }

        function copyToClipboard() {
            const textToCopy = document.getElementById('resultText').innerText;
            if (!textToCopy) return;

            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast("Código copiado al portapapeles", "success");

                // Cambiar icono temporalmente
                const icon = document.getElementById('copyIcon');
                icon.className = "fa-solid fa-check";
                setTimeout(() => {
                    icon.className = "fa-regular fa-copy";
                }, 2000);
            }).catch(err => {
                showToast("Error al copiar. Copie manualmente.", "error");
            });
        }

        let toastTimeout;
        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toastMessage.innerText = message;

            if (type === "error") {
                icon.className = "fa-solid fa-triangle-exclamation text-rose-400";
            } else {
                icon.className = "fa-solid fa-circle-check text-emerald-400";
            }

            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -10px)';
            }, 3000);
        }
    </script>
</body>

</html>
